name: Build Windows EXE

# Коли запускати збірку
on:
  push:
    branches: [ main ]        # при кожному пуші в main
    tags: [ 'v*' ]            # і при створенні тегу типу v1.0.0
  workflow_dispatch:          # + можливість запустити вручну з вкладки Actions

jobs:
  build:
    runs-on: windows-latest   # обов'язково Windows, бо .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Build EXE with PyInstaller
        run: |
          uv run pyinstaller --onefile --windowed --name ProtocolProcessor `
            --add-data "executors.txt;." `
            protocol_processor.py

      # Завантажуємо результат як артефакт - можна скачати з вкладки Actions
      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtocolProcessor-windows
          path: dist/ProtocolProcessor.exe

      # Якщо пуш був з тегом (v1.0.0 і т.д.) - автоматично створюємо GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ProtocolProcessor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}